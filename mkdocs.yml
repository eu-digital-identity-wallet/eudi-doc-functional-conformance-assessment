# ============================================================
# eudi-doc-functional-conformance-assessment (conformance.eudi.dev)
# Theme / markdown / plugins mirror the ARF canonical config.
# Site-specific: nav, repo_url, asset paths, include-markdown plugin,
#                precond_alpha hook + media/css/fcaf.css overrides.
# Note: mermaid is now provided by the superfences custom_fence (Material's
#       built-in integration), so the old extra_javascript mermaid include
#       and javascripts/mermaid-init.js are no longer needed.
# ============================================================

site_name: European Digital Identity
site_author: European Commission - DG CNECT
site_url: https://conformance.eudi.dev
repo_url: https://github.com/eu-digital-identity-wallet/eudi-doc-functional-conformance-assessment
repo_name: eu-digital-identity-wallet/eudi-doc-functional-conformance-assessment
edit_uri: edit/main/docs/
copyright: European Union, 2025 - Licensed under the EUPL-1.2 or later

# ---------------- SHARED THEME BLOCK (identical to ARF) ----------------
theme:
  name: material
  custom_dir: overrides
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.integrate
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.copy
  logo: media/images/logo_eudi_white.svg
  favicon: media/images/favicon.ico

extra_css:
  - media/css/extra.css          # shared canonical theme (same file contents everywhere)
  - media/css/fcaf.css           # site-specific overrides; MUST load after extra.css

# ---------------- SHARED MARKDOWN BLOCK (identical to ARF, minus snippets) ----------------
markdown_extensions:
  - footnotes
  - sane_lists
  - tables
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # toc_depth=4 stops the (integrated) nav at the
  # structural area/group level (h1-h4); test-case IDs render as h5 and their
  # sub-items (Objective, References, ...) as h6, so they stay out of the nav.
  - toc:
      toc_depth: 4
      permalink: true
      permalink_title: Link to this section

# ---------------- SHARED PLUGINS BLOCK + site-specific include-markdown ----------------
plugins:
  - search
  - tags
  - privacy
  - social
  - mike
  - include-markdown            # conformance-specific

# ---------------- SITE-SPECIFIC hooks ----------------
# Adds the `precond-alpha` class to the <ol> after a "Preconditions" heading so
# media/css/fcaf.css can render it with upper-alpha (A./B./C.) markers.
hooks:
  - hooks/precond_alpha.py

extra:
  version:
    provider: mike
    alias: true

nav:
  - European Digital Identity Wallet: https://eudi.dev/latest/
  - Architecture and reference framework: https://eudi.dev/latest/about/
  - Discussion topics: https://eudi.dev/latest/discussion-topics/
  - Technical specifications: https://eudi.dev/latest/technical-specifications/
  - Reference Implementation: https://docs.eudi.dev/latest/
  - Functional Conformance:
      - Home: index.md
      - Introduction: fcaf/introduction.md
      - Terminology: fcaf/terminology.md
      - Methodology: fcaf/index.md
      - Test Suites by SUTs:
          - Overview: fcaf/suts/index.md
          - Wallet Solution (SUT):
              - Overview: fcaf/suts/wallet_solution/index.md
              - Test Classes:
                  - Relying Party (ws_rp): fcaf/suts/wallet_solution/relying_party/ws_rp.md
                  - Attestation Provider (ws_ap): fcaf/suts/wallet_solution/attestation_provider/ws_ap.md
                  - PID Provider (ws_pp): fcaf/suts/wallet_solution/pid_provider/ws_pp.md
                  - Infrastructure (ws_inf): fcaf/suts/wallet_solution/infrastructure/ws_inf.md
                  - UI (ws_ui): fcaf/suts/wallet_solution/ui/ws_ui.md
      - Templates:
          - Overview: fcaf/templates/index.md
          - Test spec template: fcaf/templates/test-spec-template.md
      - References: fcaf/references.md
      - Changelog: fcaf/CHANGELOG.md
