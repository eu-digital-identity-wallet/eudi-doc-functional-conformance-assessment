name: Publish docs + PDFs (release)

on:
  push:
    branches:
      - submitted
    tags:
      - "v*"
  release:
    types: [created]

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      MKDOCS_MATERIAL_CACHE_DIR: .cache

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # Compute version
      # ------------------------------------------------------------
      - name: Compute publish context
        id: ver
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"

            if [[ ! "$TAG" =~ ^v[0-9]+(\.[0-9]+)*([\-+].*)?$ ]]; then
              echo "ERROR: Expected tag like vX.Y.Z, got: '$TAG'"
              exit 1
            fi

            echo "kind=tag" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"

            if [[ ! "$TAG" =~ ^v[0-9]+(\.[0-9]+)*([\-+].*)?$ ]]; then
              echo "ERROR: Expected tag like vX.Y.Z, got: '$TAG'"
              exit 1
            fi

            echo "kind=tag" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

          elif [[ "${GITHUB_REF}" == refs/heads/submitted ]]; then
            echo "kind=draft" >> "$GITHUB_OUTPUT"
            echo "tag=draft" >> "$GITHUB_OUTPUT"
            echo "version=draft" >> "$GITHUB_OUTPUT"

          else
            echo "ERROR: Unsupported ref: ${GITHUB_REF}"
            exit 1
          fi

      # ------------------------------------------------------------
      # System deps (Pandoc, LaTeX, SVG tools, fonts, zip)
      # - NO Chromium install (we render mermaid via Docker image)
      # ------------------------------------------------------------
      - name: Install system deps (PDF + SVG)
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            zip \
            librsvg2-bin \
            fonts-noto \
            fonts-noto-color-emoji

      # ------------------------------------------------------------
      # Provide "mmdc" via mermaid-cli Docker image (no browser install)
      # ------------------------------------------------------------
      - name: Provide mmdc via Docker (mermaid-cli)
        shell: bash
        run: |
          mkdir -p .ci/bin
          cat > .ci/bin/mmdc <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$PWD:/data" \
            -w /data \
            ghcr.io/mermaid-js/mermaid-cli/mermaid-cli:latest \
            "$@"
          EOF
          chmod +x .ci/bin/mmdc
          echo "${GITHUB_WORKSPACE}/.ci/bin" >> "$GITHUB_PATH"

          # Warm pull so the first render isn't paying the pull penalty mid-build
          docker pull ghcr.io/mermaid-js/mermaid-cli/mermaid-cli:latest

      # ------------------------------------------------------------
      # Python setup
      # ------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache MkDocs Material assets
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          path: .cache
          restore-keys: |
            mkdocs-material-${{ runner.os }}-

      - name: Install Python requirements (via Makefile)
        shell: bash
        run: make install_deps

      - name: Add venv to PATH
        shell: bash
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Configure git identity
        shell: bash
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      # ------------------------------------------------------------
      # Build PDFs
      # ------------------------------------------------------------
      - name: Clean mermaid render cache
        if: steps.ver.outputs.kind == 'tag'
        shell: bash
        run: rm -rf build/mermaid

      - name: Build PDF
        if: steps.ver.outputs.kind == 'tag'
        shell: bash
        run: make pdf VERSION=${{ steps.ver.outputs.version }}

      - name: Zip PDFs
        if: steps.ver.outputs.kind == 'tag'
        shell: bash
        run: make dist VERSION=${{ steps.ver.outputs.version }}

      # ------------------------------------------------------------
      # Deploy MkDocs versioned site
      # ------------------------------------------------------------
      - name: Deploy MkDocs with mike
        shell: bash
        run: |
          if [ "${{ steps.ver.outputs.kind }}" = "draft" ]; then
            make ci_mike_deploy_draft
          else
            make ci_mike_deploy VERSION=${{ steps.ver.outputs.version }}
          fi        

      # ------------------------------------------------------------
      # Upload artifacts (Actions)
      # ------------------------------------------------------------
      - name: Upload PDFs (artifact)
        if: steps.ver.outputs.kind == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: fcaf-pdfs-${{ steps.ver.outputs.tag }}
          path: build/pdf/*.pdf

      - name: Upload ZIP (artifact)
        if: steps.ver.outputs.kind == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: fcaf-pdfs-zip-${{ steps.ver.outputs.tag }}
          path: build/dist/*.zip

      # ------------------------------------------------------------
      # Attach to GitHub Release
      # ------------------------------------------------------------
      - name: Upload assets to GitHub Release
        if: steps.ver.outputs.kind == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            build/pdf/*.pdf
            build/dist/*.zip